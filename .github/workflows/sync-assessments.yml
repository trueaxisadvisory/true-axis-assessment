name: Sync Assessment Data from Formspree

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync-assessments:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Fetch assessment data from hardcoded submissions
        run: |
          node << 'NODEEOF'
          const fs = require('fs');
          const path = require('path');

          const respondents = [
            {
              respondent_name: "Testing diagnostic",
              organization: "DCG",
              respondent_title: "Director",
              respondent_email: "trueaxisadvisory@gmail.com",
              clarity_score: 12,
              clarity_status: "Action Required",
              execution_score: 13,
              execution_status: "Monitor",
              ownership_score: 12,
              ownership_status: "Action Required",
              challenge_score: 10,
              challenge_status: "Action Required",
              timestamp: "4/26/2026, 8:38:30 PM",
              submission_status: "Complete"
            },
            {
              respondent_name: "Shelly Sorensen",
              organization: "Reedley College Dental Assisting",
              respondent_title: "Director",
              respondent_email: "shellysorensen61@hotmail.com",
              clarity_score: 17,
              clarity_status: "Aligned",
              execution_score: 15,
              execution_status: "Monitor",
              ownership_score: 15,
              ownership_status: "Monitor",
              challenge_score: 20,
              challenge_status: "Aligned",
              timestamp: "4/22/2026, 6:07:38 PM",
              submission_status: "Complete"
            },
            {
              respondent_name: "Christine Sorensen",
              organization: "SMCS",
              respondent_title: "RN",
              respondent_email: "csorensen23@gmail.com",
              clarity_score: 15,
              clarity_status: "Monitor",
              execution_score: 15,
              execution_status: "Monitor",
              ownership_score: 15,
              ownership_status: "Monitor",
              challenge_score: 15,
              challenge_status: "Monitor",
              timestamp: "4/21/2026, 2:48:30 PM",
              submission_status: "Complete"
            },
            {
              respondent_name: "Derrick Linman",
              organization: "Falcon Financial",
              respondent_title: "Financial Advisor/Partner",
              respondent_email: "derrick@falconfi.com",
              clarity_score: 16,
              clarity_status: "Monitor",
              execution_score: 11,
              execution_status: "Action Required",
              ownership_score: 17,
              ownership_status: "Aligned",
              challenge_score: 17,
              challenge_status: "Aligned",
              timestamp: "4/21/2026, 2:59:10 PM",
              submission_status: "Complete"
            },
            {
              respondent_name: "Ivan Mercer",
              organization: "Westpac Wealth Partners",
              respondent_title: "Wealth Management Adviser",
              respondent_email: "ivan.mercer@westpacwealth.com",
              clarity_score: 15,
              clarity_status: "Monitor",
              execution_score: 13,
              execution_status: "Monitor",
              ownership_score: 13,
              ownership_status: "Monitor",
              challenge_score: 16,
              challenge_status: "Monitor",
              timestamp: "4/21/2026, 4:31:32 PM",
              submission_status: "Complete"
            },
            {
              respondent_name: "Robert Dobberstein",
              organization: "Safety Educational Services",
              respondent_title: "Owner",
              respondent_email: "robdobberstein@gmail.com",
              clarity_score: 15,
              clarity_status: "Monitor",
              execution_score: 15,
              execution_status: "Monitor",
              ownership_score: 14,
              ownership_status: "Monitor",
              challenge_score: 17,
              challenge_status: "Aligned",
              timestamp: "4/21/2026, 10:31:40 PM",
              submission_status: "Complete"
            },
            {
              respondent_name: "test 2",
              organization: "idk",
              respondent_title: "suck it",
              respondent_email: "sorensen515@yahoo.com",
              clarity_score: 20,
              clarity_status: "Aligned",
              execution_score: 20,
              execution_status: "Aligned",
              ownership_score: 20,
              ownership_status: "Aligned",
              challenge_score: 20,
              challenge_status: "Aligned",
              timestamp: "4/26/2026, 9:32:29 PM",
              submission_status: "Complete"
            }
          ];

          function getStatus(score) {
            if (score >= 17) return 'Aligned';
            if (score >= 13) return 'Monitor';
            return 'Action Required';
          }

          try {
            console.log('Processing assessment submissions...');
            
            const complete = respondents.filter(r => r.submission_status === 'Complete');
            const clarity_avg = complete.length > 0 ? (complete.reduce((s, r) => s + r.clarity_score, 0) / complete.length).toFixed(1) : 0;
            const execution_avg = complete.length > 0 ? (complete.reduce((s, r) => s + r.execution_score, 0) / complete.length).toFixed(1) : 0;
            const ownership_avg = complete.length > 0 ? (complete.reduce((s, r) => s + r.ownership_score, 0) / complete.length).toFixed(1) : 0;
            const challenge_avg = complete.length > 0 ? (complete.reduce((s, r) => s + r.challenge_score, 0) / complete.length).toFixed(1) : 0;

            const timestamps = respondents.map(r => new Date(r.timestamp));
            const minDate = timestamps.length > 0 ? new Date(Math.min(...timestamps)) : new Date();
            const maxDate = timestamps.length > 0 ? new Date(Math.max(...timestamps)) : new Date();
            const dateRange = `${minDate.getMonth()+1}/${minDate.getDate()}/${minDate.getFullYear()} to ${maxDate.getMonth()+1}/${maxDate.getDate()}/${maxDate.getFullYear()}`;

            const orgs = new Set(respondents.filter(r => r.organization).map(r => r.organization));

            const now = new Date();
            const generatedTime = now.toISOString().replace('T', ' ').slice(0, 19) + ' UTC';

            const output = {
              generated: generatedTime,
              total_respondents: respondents.length,
              total_organizations: orgs.size,
              date_range: dateRange,
              respondents: respondents,
              axis_averages: {
                clarity: parseFloat(clarity_avg),
                execution: parseFloat(execution_avg),
                ownership: parseFloat(ownership_avg),
                challenge: parseFloat(challenge_avg)
              }
            };

            const dataDir = path.join(process.cwd(), 'data');
            if (!fs.existsSync(dataDir)) {
              fs.mkdirSync(dataDir, { recursive: true });
            }

            fs.writeFileSync(
              path.join(dataDir, 'assessments.json'),
              JSON.stringify(output, null, 2)
            );

            console.log('✓ Updated assessments.json');
            console.log(`  - Total respondents: ${respondents.length}`);
            console.log(`  - Organizations: ${orgs.size}`);
            console.log(`  - Clarity avg: ${clarity_avg}/20`);
            console.log(`  - Execution avg: ${execution_avg}/20`);
            console.log(`  - Ownership avg: ${ownership_avg}/20`);
            console.log(`  - Challenge avg: ${challenge_avg}/20`);

          } catch (error) {
            console.error('Error:', error.message);
            process.exit(1);
          }
          NODEEOF

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/assessments.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update: assessment data sync" && git push)
